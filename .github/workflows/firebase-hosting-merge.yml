name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Deploy to Firebase Hosting (with retry)
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-key.json
          PROJECT_ID: builtin-ai-api-status
        run: |
          printf '%s' "$FIREBASE_SA" > "$GOOGLE_APPLICATION_CREDENTIALS"
          trap 'rm -f "$GOOGLE_APPLICATION_CREDENTIALS"' EXIT
          for attempt in 1 2 3 4 5; do
            echo "::group::Deploy attempt $attempt"
            if npx firebase-tools@latest deploy --only hosting --project "$PROJECT_ID" --non-interactive; then
              echo "::endgroup::"
              echo "Deploy succeeded on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed; retrying in 15s..."
            sleep 15
          done
          echo "All deploy attempts failed"
          exit 1
